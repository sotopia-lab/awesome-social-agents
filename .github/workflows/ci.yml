name: ci 
on:
  push:
    branches:
      - master 
      - main
  pull_request:
    branches:
      - "*"
  
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: 3.x
      - uses: actions/cache@v2
        with:
          key: ${{ github.ref }}
          path: .cache
      # Smoke-check that the paper-table generator runs cleanly against main.bib.
      - run: pip install --pre bibtexparser
      - run: pip install tabulate
      - run: pip install pandas
      - run: python bibtex_to_table.py